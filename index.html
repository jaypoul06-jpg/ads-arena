<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ADS ARENA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      increment,
      collection,
      query,
      orderBy,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAUqpShBzjFHn-HVpwU4dx28TLQjuoa-FU",
      authDomain: "ads-arena-acfd0.firebaseapp.com",
      projectId: "ads-arena-acfd0",
      storageBucket: "ads-arena-acfd0.firebasestorage.app",
      messagingSenderId: "344616959512",
      appId: "1:344616959512:web:6cad996e08b76a5ed94d6d",
      measurementId: "G-PCPN7MG7ZG"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.fb = {
      doc, getDoc, setDoc, updateDoc, increment, collection, query, orderBy, getDocs
    };
  </script>

  <!-- MONETAG (UNCHANGED) -->
  <script src='//libtl.com/sdk.js'
          data-zone='11083093'
          data-sdk='show_11083093'></script>
</head>

<body>

<!-- SPLASH -->
<div id="splash-screen"></div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- TOP HEADER -->
  <div class="top-header">
    <div class="header-user">
      <div class="avatar-wrap">
        <img id="user-photo" src="">
      </div>
      <div class="user-info">
        <div class="user-name" id="user-name">User</div>
        <div class="user-rank">ADS ARENA</div>
      </div>
    </div>
  </div>

  <!-- SCREENS -->
  <div class="screens-container">

    <!-- HOME -->
    <div class="screen active" id="screen-home">
      <div class="screen-inner">

        <div class="balance-hero">
          <div class="balance-label">ADS WATCHED</div>
          <div class="balance-amount">
            <span id="ads-watched">0</span>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-val" id="ref-count">0</div>
            <div class="stat-lbl">REFERRALS</div>
          </div>

          <div class="stat-card">
            <div class="stat-val" id="weekly-rank">-</div>
            <div class="stat-lbl">WEEK RANK</div>
          </div>
        </div>

        <button class="main-watch-btn" id="watch-ad-btn">
          WATCH ADS <span class="pts-badge">+1</span>
        </button>

      </div>
    </div>

    <!-- REF -->
    <div class="screen" id="screen-ref">
      <div class="screen-inner">

        <div class="section-card">
          <h3>REFERRAL LINK</h3>

          <div class="ref-link-box">
            <div class="ref-link-text" id="ref-link">loading...</div>
          </div>

          <div class="ref-btns">
            <button class="ref-action-btn copy-btn" id="copy-btn">Copy</button>
            <button class="ref-action-btn share-btn" id="share-btn">Share</button>
          </div>
        </div>

      </div>
    </div>

    <!-- PROFILE -->
    <div class="screen" id="screen-profile">
      <div class="screen-inner">

        <div class="profile-hero">
          <div class="profile-avatar-wrap">
            <img id="user-photo2" src="">
          </div>
          <h2 id="user-name2">User</h2>
          <div class="profile-badge">ADS ARENA PLAYER</div>
        </div>

        <div class="stats-grid">
          <div class="profile-stat">
            <div class="pstat-val" id="p-ads">0</div>
            <div class="pstat-lbl">ADS</div>
          </div>

          <div class="profile-stat">
            <div class="pstat-val" id="p-ref">0</div>
            <div class="pstat-lbl">REFS</div>
          </div>

          <div class="profile-stat">
            <div class="pstat-val" id="p-rank">-</div>
            <div class="pstat-lbl">RANK</div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" data-tab="home">HOME</button>
    <button class="nav-btn" data-tab="ref">REF</button>
    <button class="nav-btn" data-tab="profile">PROFILE</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
