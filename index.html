<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ADS ARENA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <script src="//telegram.org/js/telegram-web-app.js"></script>

  <!-- MONETAG (UNCHANGED) -->
  <script src='//libtl.com/sdk.js'
          data-zone='11083093'
          data-sdk='show_11083093'></script>
</head>

<body>

<div id="app">

  <!-- HOME -->
  <section id="screen-home" class="screen active">

    <div class="top">
      <img id="user-photo" src="https://i.imgur.com/placeholder.png">
      <h2 id="user-name">User</h2>
    </div>

    <div class="card">
      <h3>Ads Watched</h3>
      <p id="ads-watched">0</p>
    </div>

    <div class="card">
      <h3>Referrals</h3>
      <p id="ref-count">0</p>
    </div>

    <div class="card">
      <h3>Weekly Rank</h3>
      <p id="weekly-rank">-</p>
    </div>

    <button id="watch-ad-btn">WATCH ADS</button>

    <div class="history">
      <h3>Recent Activity</h3>
      <div id="history"></div>
    </div>

  </section>

  <!-- REF -->
  <section id="screen-ref" class="screen">
    <h2>REFERRALS</h2>

    <p>Your Link:</p>
    <input id="ref-link" readonly>

    <button id="copy-btn">Copy</button>
    <button id="share-btn">Share</button>

    <h3>Total: <span id="ref-total">0</span></h3>
    <p>$0.10 per referral</p>
  </section>

  <!-- PROFILE -->
  <section id="screen-profile" class="screen">
    <h2>PROFILE</h2>

    <p>Ads Watched: <span id="p-ads">0</span></p>
    <p>Referrals: <span id="p-ref">0</span></p>
    <p>Weekly Rank: <span id="p-rank">-</span></p>
  </section>

</div>

<!-- NAV -->
<div class="nav">
  <button data-tab="home">Home</button>
  <button data-tab="ref">Ref</button>
  <button data-tab="profile">Profile</button>
</div>

<script src="script.js"></script>
</body>
</html>
